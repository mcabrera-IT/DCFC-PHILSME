services:
  web:
    image: node:22-alpine
    working_dir: /app
    # Mount the current directory into the container
    volumes:
      - .:/app
    # Expose the Vite preview port
    ports:
      - "8080:4173"
    # Install dependencies, build the project, and serve it via Vite preview
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0"
